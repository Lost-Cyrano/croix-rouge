<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Bilan PSE</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f1f5f9;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }

    .swipe-container {
      position: relative;
      width: 100%;
      height: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .swipe-container::-webkit-scrollbar { display: none; }

    .pages-wrapper {
      display: flex;
      flex-direction: row;
      width: 300%;
      height: 100%;
    }

    .page {
      width: 33.333%;
      height: 100%;
      scroll-snap-align: start;
      flex-shrink: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .page-content {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      padding: clamp(12px, 2vh, 20px) clamp(14px, 3vw, 24px);
      gap: clamp(12px, 2vh, 20px);
    }

    /* Cartes */
    .card {
      background: white;
      border-radius: clamp(20px, 4vw, 28px);
      padding: clamp(14px, 2.2vh, 22px) clamp(16px, 3.5vw, 24px);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      border: 1px solid #eef2f8;
    }

    .section-title {
      font-weight: 700;
      font-size: clamp(15px, 4vw, 18px);
      color: #0f172a;
      margin-bottom: clamp(12px, 2vh, 18px);
      padding-left: 8px;
      border-left: 4px solid #2563eb;
    }

    /* Grille 2x2 Bilan UV */
    .grid-2x2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(10px, 2vw, 14px);
    }

    .chip {
      display: flex;
      align-items: center;
      gap: clamp(8px, 1.8vw, 12px);
      background: #f8fafc;
      padding: clamp(10px, 1.8vh, 14px) clamp(12px, 2.5vw, 16px);
      border-radius: 60px;
      border: 1px solid #e2e8f0;
      cursor: pointer;
    }
    .chip:active { transform: scale(0.98); background: #f1f5f9; }
    .chip input {
      width: clamp(18px, 4vw, 22px);
      height: clamp(18px, 4vw, 22px);
      cursor: pointer;
      accent-color: #2563eb;
    }
    .chip label {
      font-size: clamp(13px, 3.2vw, 15px);
      font-weight: 600;
      color: #1e293b;
      cursor: pointer;
      flex: 1;
    }

    /* Grille fixe 2 colonnes pour Neurologique */
    .neuro-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(8px, 1.8vw, 12px);
    }
    .neuro-item {
      display: flex;
      align-items: center;
      gap: clamp(8px, 1.8vw, 12px);
      background: #f8fafc;
      padding: clamp(8px, 1.5vh, 12px) clamp(10px, 2vw, 14px);
      border-radius: 50px;
      border: 1px solid #e2e8f0;
    }
    .neuro-item input {
      width: clamp(17px, 3.8vw, 20px);
      height: clamp(17px, 3.8vw, 20px);
      accent-color: #2563eb;
    }
    .neuro-item label {
      font-size: clamp(12px, 2.8vw, 14px);
      font-weight: 500;
    }
    .pci-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f8fafc;
      padding: 8px 12px;
      border-radius: 50px;
      border: 1px solid #e2e8f0;
      flex-wrap: wrap;
    }
    .pci-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
    }
    .pci-item label {
      font-size: 13px;
      font-weight: 500;
    }
    .pci-duree {
      width: 65px;
      padding: 5px 8px;
      border: 1px solid #cbd5e1;
      border-radius: 30px;
      font-size: 13px;
      text-align: center;
    }

    /* Page 2 : structure en 3 bandes équilibrées */
    .bande-respi, .bande-circu, .bande-crono {
      width: 100%;
    }

    .bande-respi, .bande-circu {
      background: white;
      border-radius: 28px;
      padding: clamp(14px, 2.2vh, 20px) clamp(16px, 3.5vw, 24px);
      border: 1px solid #eef2f8;
    }

    .bande-title {
      font-weight: 700;
      font-size: clamp(16px, 4.2vw, 20px);
      margin-bottom: clamp(14px, 2vh, 20px);
      text-align: center;
      color: #0f172a;
      letter-spacing: -0.3px;
    }

    /* Grille pour les lignes de saisie */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(12px, 2vw, 18px);
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-field label {
      font-size: clamp(12px, 3vw, 14px);
      font-weight: 600;
      color: #475569;
    }
    .form-field input {
      font-size: clamp(16px, 4vw, 20px);
      padding: clamp(10px, 1.8vh, 14px) clamp(12px, 2.5vw, 16px);
      border: 1.5px solid #e2e8f0;
      border-radius: 50px;
      text-align: center;
      background: white;
      font-weight: 500;
      width: 100%;
    }
    .form-field input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }

    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 8px;
    }
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f8fafc;
      padding: 8px 14px;
      border-radius: 40px;
      border: 1px solid #e2e8f0;
      cursor: pointer;
    }
    .checkbox-label input {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #2563eb;
    }
    .checkbox-label span {
      font-size: clamp(12px, 2.8vw, 14px);
      font-weight: 500;
    }

    /* Ref conditionnel */
    .ref-container {
      margin-top: 8px;
      transition: all 0.2s;
    }
    .ref-hidden {
      display: none;
    }

    /* Chrono bande */
    .bande-crono {
      background: white;
      border-radius: 28px;
      padding: clamp(14px, 2.2vh, 20px) clamp(16px, 3.5vw, 24px);
      border: 1px solid #eef2f8;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(20px, 5vw, 40px);
      flex-wrap: wrap;
    }
    .chrono-btn {
      background: #2563eb;
      border: none;
      color: white;
      font-weight: 700;
      padding: clamp(10px, 1.8vh, 16px) clamp(24px, 5vw, 36px);
      border-radius: 60px;
      font-size: clamp(16px, 4vw, 20px);
      cursor: pointer;
    }
    .chrono-btn:active { transform: scale(0.97); }
    .chrono-display {
      font-family: monospace;
      font-size: clamp(32px, 8vw, 52px);
      font-weight: 800;
      background: #f1f5f9;
      padding: clamp(6px, 1.2vh, 12px) clamp(20px, 4vw, 36px);
      border-radius: 70px;
      letter-spacing: 3px;
    }

    /* Indicateur de page */
    .page-indicator {
      position: fixed;
      bottom: max(12px, 2vh);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 30;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      padding: 6px 18px;
      border-radius: 50px;
      pointer-events: none;
    }
    .ind-dot {
      width: 7px;
      height: 7px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 50%;
      transition: all 0.2s;
    }
    .ind-dot.active {
      width: 26px;
      background: #1e293b;
      border-radius: 5px;
    }

    /* Responsive global */
    @media (min-height: 750px) {
      .form-field input { font-size: 18px; padding: 12px 16px; }
      .checkbox-label span { font-size: 14px; }
    }
    @media (min-width: 1000px) {
      .page-content { max-width: 900px; margin: 0 auto; width: 100%; }
    }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { opacity: 0.5; }
  </style>
</head>
<body>

<div class="swipe-container" id="swipeContainer">
  <div class="pages-wrapper">
    <!-- PAGE 1 : Bilan UV + Neurologique -->
    <div class="page">
      <div class="page-content">
        <div class="card">
          <div class="section-title">Bilan UV</div>
          <div class="grid-2x2">
            <div class="chip"><input type="checkbox" id="obva"><label for="obva">OBVA</label></div>
            <div class="chip"><input type="checkbox" id="hemorragie"><label for="hemorragie">Hémorragie</label></div>
            <div class="chip"><input type="checkbox" id="inconscience"><label for="inconscience">Inconscience</label></div>
            <div class="chip"><input type="checkbox" id="ar"><label for="ar">AR</label></div>
            <div class="chip"><input type="checkbox" id="ac"><label for="ac">AC</label></div>
          </div>
        </div>

        <div class="card">
          <div class="section-title">Neurologique</div>
          <div class="neuro-grid">
            <div class="neuro-item"><input type="checkbox" id="pasYeux"><label for="pasYeux">N'ouvre pas les yeux</label></div>
            <div class="neuro-item"><input type="checkbox" id="repVerbale"><label for="repVerbale">Rép. verbale non-adaptée</label></div>
            <div class="neuro-item"><input type="checkbox" id="desorientation"><label for="desorientation">Désorientation</label></div>
            <div class="neuro-item"><input type="checkbox" id="motriceAdaptee"><label for="motriceAdaptee">Rep. motrice adaptee</label></div>
            <div class="neuro-item"><input type="checkbox" id="deficitMoteur"><label for="deficitMoteur">Deficit moteur</label></div>
            <div class="pci-item">
              <input type="checkbox" id="pciCheck">
              <label>PCI</label>
              <input type="number" id="pciDuree" class="pci-duree" placeholder="min" disabled>
            </div>
            <div class="neuro-item"><input type="checkbox" id="anysocorie"><label for="anysocorie">Anysocorie</label></div>
          </div>
        </div>
      </div>
    </div>

    <!-- PAGE 2 : 3 bandes équilibrées -->
    <div class="page">
      <div class="page-content">
        <!-- Bande Respiratoire -->
        <div class="bande-respi">
          <div class="bande-title">Respiratoire</div>
          <div class="form-grid">
            <div class="form-field">
              <label>FR (/min)</label>
              <input type="number" id="fr" placeholder="—">
            </div>
            <div class="form-field">
              <label>SpO₂ (%)</label>
              <input type="number" id="spo2" placeholder="—">
            </div>
          </div>
          <div class="checkbox-group">
            <label class="checkbox-label"><input type="checkbox" id="ventAmple"><span>Ventilation Ample</span></label>
            <label class="checkbox-label"><input type="checkbox" id="ventReguliere"><span>Ventilation régulière</span></label>
          </div>
        </div>

        <!-- Bande Circulatoire -->
        <div class="bande-circu">
          <div class="bande-title">Circulatoire</div>
          <div class="form-grid">
            <div class="form-field">
              <label>FC (/min)</label>
              <input type="number" id="fc" placeholder="—">
            </div>
            <div class="form-field">
              <label>TA (sys/dia)</label>
              <div style="display: flex; gap: 8px;">
                <input type="number" id="taSys" placeholder="sys" style="flex:1;" maxlength="3">
                <span style="font-size: 20px; align-self: center;">/</span>
                <input type="number" id="taDia" placeholder="dia" style="flex:1;" maxlength="2">
              </div>
            </div>
          </div>
          
          <!-- Ref avec conditionnel -->
          <label class="checkbox-label" style="display: inline-flex; margin-top: 4px;">
            <input type="checkbox" id="refCheck"><span>Ref</span>
          </label>
          <div id="refContainer" class="ref-hidden">
            <div class="form-field" style="margin-top: 10px;">
              <label>TA Ref (sys/dia)</label>
              <div style="display: flex; gap: 8px;">
                <input type="number" id="refSys" placeholder="sys" style="flex:1;" disabled maxlength="3">
                <span style="font-size: 20px; align-self: center;">/</span>
                <input type="number" id="refDia" placeholder="dia" style="flex:1;" disabled maxlength="2">
              </div>
            </div>
          </div>

          <div class="checkbox-group" style="margin-top: 12px;">
            <label class="checkbox-label"><input type="checkbox" id="irregulier"><span>Irregulier</span></label>
            <label class="checkbox-label"><input type="checkbox" id="filant"><span>Filant</span></label>
            <label class="checkbox-label"><input type="checkbox" id="poulsRadial"><span>Pouls Radial</span></label>
          </div>
        </div>

        <!-- Bande Chrono -->
        <div class="bande-crono">
          <button class="chrono-btn" id="startCronoBtn">Démarrer</button>
          <span class="chrono-display" id="cronoDisplay">01:00</span>
        </div>
      </div>
    </div>

    <!-- PAGE 3 -->
    <div class="page">
      <div class="page-content">
        <div class="card" style="text-align: center; padding: 40px 24px;">
          <div style="font-size: clamp(22px, 6vw, 32px); font-weight: 600; color: #334155;">Page 3</div>
          <div style="font-size: clamp(16px, 4vw, 20px); color: #94a3b8; margin-top: 12px;">à venir</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="page-indicator" id="indicator">
  <div class="ind-dot"></div>
  <div class="ind-dot"></div>
  <div class="ind-dot"></div>
</div>

<script>
  (function() {
    // SWIPE avec arrêt obligatoire sur chaque page (snap forcé)
    const container = document.getElementById('swipeContainer');
    const dots = document.querySelectorAll('.ind-dot');
    let activeIndex = 0;
    let isProgrammatic = false;
    let isSnapping = false;
    let snapTimeout = null;

    function updateIndicator(index) {
      dots.forEach((dot, i) => {
        if (i === index) dot.classList.add('active');
        else dot.classList.remove('active');
      });
      activeIndex = index;
    }

    function getTargetScroll(index) {
      return index * container.clientWidth;
    }

    function snapToPage(index, behavior = 'smooth') {
      if (isSnapping) return;
      isSnapping = true;
      isProgrammatic = true;
      const target = getTargetScroll(index);
      container.scrollTo({ left: target, behavior: behavior });
      setTimeout(() => {
        isProgrammatic = false;
        if (snapTimeout) clearTimeout(snapTimeout);
        snapTimeout = setTimeout(() => { isSnapping = false; }, 400);
      }, 350);
      updateIndicator(index);
    }

    let scrollEndTimer = null;
    function onScrollHandler() {
      if (isProgrammatic) return;
      if (scrollEndTimer) clearTimeout(scrollEndTimer);
      
      scrollEndTimer = setTimeout(() => {
        const width = container.clientWidth;
        const currentScroll = container.scrollLeft;
        const rawIndex = currentScroll / width;
        const newIndex = Math.round(rawIndex);
        if (newIndex !== activeIndex && newIndex >= 0 && newIndex <= 2) {
          snapToPage(newIndex, 'smooth');
        } else if (Math.abs(currentScroll - getTargetScroll(activeIndex)) > 5) {
          snapToPage(activeIndex, 'smooth');
        }
        scrollEndTimer = null;
      }, 60);
    }

    container.addEventListener('scroll', onScrollHandler);
    container.addEventListener('scrollend', () => {
      if (scrollEndTimer) clearTimeout(scrollEndTimer);
      const width = container.clientWidth;
      const finalIndex = Math.round(container.scrollLeft / width);
      if (finalIndex !== activeIndex) {
        snapToPage(finalIndex, 'auto');
      } else {
        const target = getTargetScroll(activeIndex);
        if (Math.abs(container.scrollLeft - target) > 2) {
          snapToPage(activeIndex, 'smooth');
        }
      }
    });

    function initSwipe() {
      container.scrollLeft = 0;
      updateIndicator(0);
      activeIndex = 0;
    }

    let resizeTimer;
    function onResize() {
      if (resizeTimer) clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        const target = getTargetScroll(activeIndex);
        isProgrammatic = true;
        container.scrollTo({ left: target, behavior: 'auto' });
        setTimeout(() => { isProgrammatic = false; }, 100);
      }, 150);
    }
    window.addEventListener('resize', onResize);
    window.addEventListener('orientationchange', onResize);
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initSwipe);
    else initSwipe();

    // ----- CONDITIONNELS -----
    // PCI
    const pciCheck = document.getElementById('pciCheck');
    const pciDuree = document.getElementById('pciDuree');
    function togglePCI() {
      pciDuree.disabled = !pciCheck.checked;
      if (!pciCheck.checked) pciDuree.value = '';
    }
    pciCheck.addEventListener('change', togglePCI);
    togglePCI();

    // Ref conditionnel (affichage/masquage)
    const refCheck = document.getElementById('refCheck');
    const refContainer = document.getElementById('refContainer');
    const refSys = document.getElementById('refSys');
    const refDia = document.getElementById('refDia');
    
    function toggleRef() {
      if (refCheck.checked) {
        refContainer.classList.remove('ref-hidden');
        refSys.disabled = false;
        refDia.disabled = false;
      } else {
        refContainer.classList.add('ref-hidden');
        refSys.disabled = true;
        refDia.disabled = true;
        refSys.value = '';
        refDia.value = '';
      }
    }
    refCheck.addEventListener('change', toggleRef);
    toggleRef();

    // ----- COUNTDOWN 1 MINUTE -----
    let countdownInterval = null;
    let remainingSeconds = 60;
    const startBtn = document.getElementById('startCronoBtn');
    const display = document.getElementById('cronoDisplay');

    function formatTime(sec) {
      const mins = Math.floor(sec / 60);
      const secs = sec % 60;
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function stopCountdown() {
      if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
    }

    function startCountdown() {
      stopCountdown();
      remainingSeconds = 60;
      display.textContent = formatTime(60);
      countdownInterval = setInterval(() => {
        if (remainingSeconds > 0) {
          remainingSeconds--;
          display.textContent = formatTime(remainingSeconds);
          if (remainingSeconds === 0) stopCountdown();
        } else stopCountdown();
      }, 1000);
    }
    startBtn.addEventListener('click', startCountdown);

    // Limites inputs
    document.getElementById('taSys').maxLength = 3;
    document.getElementById('taDia').maxLength = 2;
    document.getElementById('refSys').maxLength = 3;
    document.getElementById('refDia').maxLength = 2;

    // Ajustement responsive pour éviter tout scroll vertical
    function adjustHeight() {
      const pages = document.querySelectorAll('.page');
      pages.forEach(page => {
        if (page.scrollHeight > page.clientHeight + 8) {
          const content = page.querySelector('.page-content');
          if (content) {
            let currentGap = getComputedStyle(content).gap;
            let gapVal = parseInt(currentGap);
            if (gapVal > 8) content.style.gap = '8px';
          }
        }
      });
    }
    window.addEventListener('resize', () => setTimeout(adjustHeight, 60));
    setTimeout(adjustHeight, 100);
  })();
</script>
</body>
</html>
